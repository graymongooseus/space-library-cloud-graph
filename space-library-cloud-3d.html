<div class="top-tools">
  <select class="filter-select" id="schoolNameFilter"><option value="">School Name</option></select>
  <select class="filter-select" id="schoolFilter"><option value="">School Type</option></select>

  <label class="theme-control">School Project <input type="color" data-theme-key="project" value="#ff7f0e"></label>
  <label class="theme-control">Space Name <input type="color" data-theme-key="space" value="#1f77b4"></label>
  <label class="theme-control">School Type <input type="color" data-theme-key="category" value="#2ca02c"></label>
</div>

<div id="graph-container"></div>
<div id="tooltip"></div>

<script>
let Graph;
let graphData = { categories: [], nodes: [], links: [] };
let nodesById = new Map();
let colorMap = {};
let activeGraph = graphData;
let searchMatches = new Set();
let autoRotateFrame = 0;
let ambientDriftFrame = 0;
let hoverFocus = { nodeId: null, nodeIds: new Set(), linkKeys: new Set() };
let selectedDetailNode = null;
let hoverSuppressUntil = 0;
let hoverDisabledUntilPointerMove = false;
let draggingNode = null;
let dragRecoveryTimer = 0;
const nodeObjectsById = new Map();
const SPACE_NODE_RADIUS_SCALE = 1;
const OTHER_NODE_RADIUS_SCALE = 0.75;

const VISUAL_THEME = {
  project: { color: '#ff7f0e', halo: '#ff7f0e', minRadius: 8, maxRadius: 18, opacity: 0.9, haloOpacity: 0.035 },
  category: { color: '#2ca02c', halo: '#2ca02c', minRadius: 5.5, maxRadius: 11, opacity: 0.86, haloOpacity: 0.025 },
  space: { color: '#1f77b4', halo: '#1f77b4', minRadius: 1.8, maxRadius: 4.4, opacity: 0.9, haloOpacity: 0.03 },
  center: { color: '#c7d2fe', halo: '#c7d2fe', minRadius: 12, maxRadius: 20, opacity: 0.38, haloOpacity: 0.02 },
  dim: '#243049',
  search: '#fff4a8',
  highlight: '#fff4a8'
};

function getGraphDataUrl() {
  const params = new URLSearchParams(window.location.search);
  const requested = params.get('data');
  if (!requested) return 'space-library-graph.json';
  if (/^https?:\/\//i.test(requested) || requested.includes('..')) {
    return 'space-library-graph.json';
  }
  return requested;
}

const GRAPH_DATA_URL = getGraphDataUrl();

function showLoadError(error) {
  const errorEl = document.querySelector('.load-error');
  errorEl.textContent = `图谱数据加载失败：${error.message}`;
  errorEl.style.display = 'block';
}

function waitForGraphLibrary(attempt = 0) {
  if (typeof ForceGraph3D !== 'undefined') {
    loadGraphData();
    return;
  }
  if (attempt < 20) {
    window.setTimeout(() => waitForGraphLibrary(attempt + 1), 100);
    return;
  }
  showLoadError(new Error('3D 图谱库没有加载，请检查 vendor/3d-force-graph.min.js'));
}

async function loadGraphData() {
  try {
    if (typeof ForceGraph3D === 'undefined') {
      throw new Error('3D 图谱库没有加载，请检查 vendor/3d-force-graph.min.js');
    }
    const response = await fetch(GRAPH_DATA_URL, { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const data = await response.json();
    initGraph(data);
  } catch (error) {
    showLoadError(error);
    console.error('Failed to load graph data', error);
  }
}

function initGraph(data) {
  const categories = Array.isArray(data.categories) ? data.categories : [];
  const nodes = Array.isArray(data.nodes) ? data.nodes : [];
  const links = Array.isArray(data.links) ? data.links : [];

  graphData = {
    categories: categories.map(category => ({ ...category })),
    nodes: nodes.map(node => ({ ...node })),
    links: links.map(link => ({
      ...link,
      source: normalizeLinkEndpoint(link.source),
      target: normalizeLinkEndpoint(link.target)
    }))
  };

  nodesById = new Map(graphData.nodes.map(node => [node.id, node]));
  colorMap = graphData.categories.reduce((colors, category) => {
    colors[category.name] = category.color;
    return colors;
  }, {});
  activeGraph = graphData;

  fillFilter('schoolNameFilter', '学校项目');
  fillFilter('schoolFilter', '学校类型');
  updateStats(graphData);

  Graph = ForceGraph3D()(document.getElementById('graph-container'))
    .backgroundColor('#000106')
    .graphData(cloneGraph(graphData))
    .nodeLabel(() => '')
    .nodeColor(nodeColor)
    .nodeOpacity(nodeOpacity)
    .nodeRelSize(4)
    .nodeVal(nodeSize)
    .nodeThreeObject(makeNodeObject)
    .nodeThreeObjectExtend(false)
    .linkColor(linkColor)
    .linkOpacity(linkOpacity)
    .linkWidth(linkWidth)
    .enableNodeDrag(true)
    .onNodeDrag(handleNodeDrag)
    .onNodeDragEnd(handleNodeDragEnd)
    .onNodeHover(handleNodeHover)
    .onNodeClick(handleNodeClick);

  Graph.width(window.innerWidth);
  Graph.height(window.innerHeight);
  Graph.d3Force('charge').strength(-52);
  Graph.d3Force('link').distance(linkDistance);
  Graph.d3VelocityDecay(0.42);
  addSceneLights();
  Graph.cameraPosition({ x: 0, y: 0, z: 1250 }, { x: 0, y: 0, z: 0 }, 0);
  resetCameraControls();
  setTimeout(() => focusInitialGraph(900), 1200);
  updateActiveFilterChips();
}

function fillFilter(selectId, categoryName) {
  const select = document.getElementById(selectId);
  if (!select) return;
  const placeholder = select.options[0] ? select.options[0].cloneNode(true) : null;
  select.innerHTML = '';
  if (placeholder) select.appendChild(placeholder);

  graphData.nodes
    .filter(node => node.category === categoryName)
    .sort((a, b) => (a.label || '').localeCompare(b.label || '', 'zh-Hans-CN'))
    .forEach(node => {
      const option = document.createElement('option');
      option.value = node.id;
      option.textContent = node.label || node.id;
      select.appendChild(option);
    });
}

function normalizeLinkEndpoint(endpoint) {
  if (endpoint && typeof endpoint === 'object') return endpoint.id;
  return endpoint;
}

function cloneGraph(sourceGraph) {
  return {
    categories: sourceGraph.categories.map(category => ({ ...category })),
    nodes: sourceGraph.nodes.map(node => ({ ...node })),
    links: sourceGraph.links.map(link => ({ ...link }))
  };
}

function visualRole(node) {
  if (node.category === 'Education Project') return VISUAL_THEME.center;
  if (node.category === '项目' || node.category === '学校项目') return VISUAL_THEME.project;
  if (node.category === '空间产品' || node.category === '空间名称') return VISUAL_THEME.space;
  return VISUAL_THEME.category;
}

function interpolateColor(from, to, ratio) {
  const clamp = Math.max(0, Math.min(1, ratio));
  const parse = color => [1, 3, 5].map(index => parseInt(color.slice(index, index + 2), 16));
  const start = parse(from);
  const end = parse(to);
  const mixed = start.map((value, index) => Math.round(value + (end[index] - value) * clamp));
  return `#${mixed.map(value => value.toString(16).padStart(2, '0')).join('')}`;
}

function colorWithAlpha(color, alpha) {
  const normalized = safeColor(color);
  const value = normalized.length === 4
    ? `#${normalized[1]}${normalized[1]}${normalized[2]}${normalized[2]}${normalized[3]}${normalized[3]}`
    : normalized;
  const red = parseInt(value.slice(1, 3), 16);
  const green = parseInt(value.slice(3, 5), 16);
  const blue = parseInt(value.slice(5, 7), 16);
  return `rgba(${red},${green},${blue},${alpha})`;
}

function projectConnectionStrength(node) {
  const spaceCount = node.meta && node.meta.project && Number(node.meta.project.spaceCount);
  const count = Number.isFinite(spaceCount) ? spaceCount : (node.size || 0);
  return Math.max(0, Math.min(1, count / 34));
}

function projectColor(node) {
  return interpolateColor(VISUAL_THEME.project.color, '#d62728', projectConnectionStrength(node));
}

function nodeSize(node) {
  const role = visualRole(node);
  const isSpaceNode = node.category === '空间产品' || node.category === '空间名称';
  const base = node.category === '项目' || node.category === '学校项目' ? (node.size || 22) * 0.765 : (node.size || 10) * 0.48;
  return Math.max(role.minRadius, Math.min(role.maxRadius, base)) * (isSpaceNode ? SPACE_NODE_RADIUS_SCALE : OTHER_NODE_RADIUS_SCALE);
}

function nodeOpacity(node) {
  if (searchMatches.size && !searchMatches.has(node.id)) return 0.18;
  return visualRole(node).opacity;
}

function nodeColor(node) {
  if (hoverFocus.nodeId && node.id === hoverFocus.nodeId) return VISUAL_THEME.highlight;
  if (searchMatches.size && !searchMatches.has(node.id)) return VISUAL_THEME.dim;
  if (searchMatches.has(node.id)) return VISUAL_THEME.search;
  return nodeBaseColor(node);
}

function nodeBaseColor(node) {
  if (node.category === '项目' || node.category === '学校项目') return projectColor(node);
  return visualRole(node).color;
}

function relationKey(sourceId, targetId) {
  return [sourceId, targetId].sort().join('::');
}

function buildHoverState(node) {
  if (!node) return { nodeId: null, nodeIds: new Set(), linkKeys: new Set() };
  const nodeIds = new Set([node.id]);
  const linkKeys = new Set();
  activeGraph.links.forEach(link => {
    const sourceId = endpointId(link.source);
    const targetId = endpointId(link.target);
    if (sourceId !== node.id && targetId !== node.id) return;
    nodeIds.add(sourceId);
    nodeIds.add(targetId);
    linkKeys.add(relationKey(sourceId, targetId));
  });
  return { nodeId: node.id, nodeIds, linkKeys };
}

function isHoverLink(link) {
  return hoverFocus.linkKeys.has(relationKey(endpointId(link.source), endpointId(link.target)));
}

function linkColor(link) {
  if (!hoverFocus.nodeId) return 'rgba(145,165,190,0.22)';
  return isHoverLink(link) ? colorWithAlpha(VISUAL_THEME.highlight, 0.82) : 'rgba(88,98,118,0.09)';
}

function linkOpacity(link) {
  if (!hoverFocus.nodeId) return 0.2;
  return isHoverLink(link) ? 0.72 : 0.05;
}

function linkWidth(link) {
  if (!hoverFocus.nodeId) return 0;
  return isHoverLink(link) ? 0.9 : 0;
}

function nodeSphereRadius(node) {
  return nodeSize(node);
}

function makeTextSprite(text, color = '#f5f5f5') {
  if (typeof THREE === 'undefined' || !text) return null;
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  const fontSize = 28;
  context.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif`;
  const metrics = context.measureText(text);
  const width = Math.ceil(metrics.width + 32);
  const height = 54;
  canvas.width = width;
  canvas.height = height;
  context.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif`;
  context.textBaseline = 'middle';
  context.fillStyle = 'rgba(0,0,0,0.34)';
  context.fillRect(0, 0, width, height);
  context.fillStyle = color;
  context.fillText(text, 16, height / 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const material = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthWrite: false,
    depthTest: false,
  });
  const sprite = new THREE.Sprite(material);
  const scale = 0.22;
  sprite.scale.set(width * scale, height * scale, 1);
  return sprite;
}

function makeNodeObject(node) {
  if (typeof THREE === 'undefined') return null;
  const color = nodeColor(node);
  const radius = nodeSphereRadius(node);
  const opacity = nodeOpacity(node);
  const role = visualRole(node);
  const isSearchMatch = searchMatches.has(node.id);
  const isHoverMatch = hoverFocus.nodeIds.has(node.id);
  const isProjectNode = node.category === '项目' || node.category === '学校项目';
  const isSpaceNode = node.category === '空间产品' || node.category === '空间名称';
  const projectGlow = isProjectNode ? interpolateColor(VISUAL_THEME.project.halo, '#d62728', projectConnectionStrength(node)) : role.halo;
  const geometry = new THREE.SphereGeometry(radius, 12, 8);
  const material = new THREE.MeshPhongMaterial({
    color,
    emissive: isSearchMatch || node.id === hoverFocus.nodeId ? VISUAL_THEME.highlight : projectGlow,
    emissiveIntensity: isSearchMatch || node.id === hoverFocus.nodeId ? 0.55 : 0.035,
    shininess: 18,
    transparent: true,
    opacity,
    depthWrite: false
  });
  const sphere = new THREE.Mesh(geometry, material);

  const haloScale = isSearchMatch || isHoverMatch ? 1.72 : 1.28;
  const haloGeometry = new THREE.SphereGeometry(radius * haloScale, 12, 8);
  const haloMaterial = new THREE.MeshBasicMaterial({
    color: isSearchMatch || isHoverMatch ? VISUAL_THEME.highlight : projectGlow,
    transparent: true,
    opacity: isSearchMatch || isHoverMatch ? 0.18 : role.haloOpacity,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const halo = new THREE.Mesh(haloGeometry, haloMaterial);

  const group = new THREE.Group();
  group.add(halo);
  group.add(sphere);
  if (node.category === '学校项目') {
    const label = makeTextSprite(node.label || node.id, '#ffe4c2');
    if (label) {
      label.position.set(radius + 42, -radius * 0.1, 0);
      group.add(label);
    }
  }
  if (isProjectNode) {
    const coreGeometry = new THREE.SphereGeometry(radius * 0.28, 12, 8);
    const coreMaterial = new THREE.MeshBasicMaterial({
      color: interpolateColor('#ffe2c4', VISUAL_THEME.project.color, projectConnectionStrength(node)),
      transparent: true,
      opacity: 0.16,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    group.add(new THREE.Mesh(coreGeometry, coreMaterial));
  }
  node.__driftPhase = node.__driftPhase || Math.random() * Math.PI * 2;
  group.scale.setScalar(isHoverMatch ? 1.12 : 1);
  nodeObjectsById.set(node.id, group);
  return group;
}

function updateStats(sourceGraph = activeGraph) {
  const stats = document.getElementById('stats');
  if (stats) {
    stats.textContent = `${sourceGraph.nodes.length} 个实体 · ${sourceGraph.links.length} 条关系`;
  }
}

function showTooltip(node) {
  const tooltip = document.getElementById('tooltip');
  if (!node) {
    tooltip.style.opacity = 0;
    return;
  }
  tooltip.innerHTML = `<strong>${escapeHtml(node.label || node.id)}</strong><br>${escapeHtml(node.category || '')}`;
  tooltip.style.opacity = 1;
}

function handleNodeHover(node) {
  if (node && (hoverDisabledUntilPointerMove || Date.now() < hoverSuppressUntil)) {
    showTooltip(null);
    return;
  }
  hoverFocus = buildHoverState(node);
  showTooltip(node);
  refreshNodeAppearance();
}

function clearHoverFocus() {
  hoverFocus = buildHoverState(null);
  showTooltip(null);
  refreshNodeAppearance();
}

function setCameraControlsEnabled(enabled) {
  const controls = Graph && Graph.controls && Graph.controls();
  if (!controls) return;
  controls.enabled = Boolean(enabled);
  controls.update();
}

function releaseDraggedNode() {
  if (!draggingNode) return;
  draggingNode.fx = undefined;
  draggingNode.fy = undefined;
  draggingNode.fz = undefined;
  draggingNode = null;
  if (Graph) Graph.d3ReheatSimulation();
}

function recoverNodeDrag() {
  window.clearTimeout(dragRecoveryTimer);
  releaseDraggedNode();
  setCameraControlsEnabled(true);
}

function scheduleDragRecovery() {
  window.clearTimeout(dragRecoveryTimer);
  dragRecoveryTimer = window.setTimeout(recoverNodeDrag, 700);
}

function handleNodeDrag(node) {
  if (!node) return;
  draggingNode = node;
  setCameraControlsEnabled(false);
  node.fx = node.x;
  node.fy = node.y;
  node.fz = node.z;
  scheduleDragRecovery();
  if (Graph) Graph.d3ReheatSimulation();
}

function handleNodeDragEnd(node) {
  draggingNode = node || draggingNode;
  window.setTimeout(recoverNodeDrag, 120);
  window.setTimeout(() => setCameraControlsEnabled(true), 80);
}

function endpointId(endpoint) {
  return endpoint && typeof endpoint === 'object' ? endpoint.id : endpoint;
}

function linkDistance(link) {
  const source = nodesById.get(endpointId(link.source));
  const target = nodesById.get(endpointId(link.target));
  if (!source || !target) return 46;
  if (source.category === 'Education Project' || target.category === 'Education Project') return 46;
  if (source.category === '学校类型' || target.category === '学校类型') return 33;
  if (source.category === '学校项目' || target.category === '学校项目' || source.category === '项目' || target.category === '项目') return 66;
  if (source.category === '空间名称' || target.category === '空间名称' || source.category === '空间产品' || target.category === '空间产品') return 42;
  return 54;
}

function selectedFilterId() {
  return document.getElementById('schoolNameFilter').value ||
    document.getElementById('schoolFilter').value ||
    '';
}

function selectedFilterEntries() {
  return ['schoolNameFilter', 'schoolFilter']
    .map(selectId => {
      const select = document.getElementById(selectId);
      if (!select || !select.value) return null;
      const option = select.options[select.selectedIndex];
      return { id: select.value, label: option ? option.textContent : select.value };
    })
    .filter(Boolean);
}

function updateActiveFilterChips() {
  const chipContainer = document.getElementById('activeFilters');
  if (!chipContainer) return;
  const entries = selectedFilterEntries();
  chipContainer.classList.toggle('visible', entries.length > 0);
  chipContainer.innerHTML = entries
    .map(entry => `<span class="filter-chip">${escapeHtml(entry.label)}</span>`)
    .join('');
}

function subgraphForNode(nodeId) {
  if (!nodeId) return graphData;
  const nodeIds = new Set([nodeId]);
  graphData.links.forEach(link => {
    const sourceId = endpointId(link.source);
    const targetId = endpointId(link.target);
    if (sourceId === nodeId) nodeIds.add(targetId);
    if (targetId === nodeId) nodeIds.add(sourceId);
  });
  return {
    categories: graphData.categories,
    nodes: graphData.nodes.filter(node => nodeIds.has(node.id)),
    links: graphData.links.filter(link => nodeIds.has(endpointId(link.source)) && nodeIds.has(endpointId(link.target)))
  };
}

function applyFilters() {
  const filterId = selectedFilterId();
  const nextGraph = filterId ? subgraphForNode(filterId) : graphData;
  activeGraph = nextGraph;
  searchMatches.clear();
  if (Graph) {
    Graph.graphData(cloneGraph(nextGraph));
    refreshNodeAppearance();
    focusGraph(nextGraph, 900);
  }
  updateStats(nextGraph);
  updateActiveFilterChips();
}

function handleFilterChange(event) {
  const changedId = event.target.id;
  ['schoolNameFilter', 'schoolFilter'].forEach(selectId => {
    if (selectId !== changedId) document.getElementById(selectId).value = '';
  });
  applyFilters();
}

function resetGraphView() {
  document.getElementById('detailOverlay').classList.remove('active');
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightbox').innerHTML = '';
  selectedDetailNode = null;
  hoverSuppressUntil = Date.now() + 400;
  hoverDisabledUntilPointerMove = false;
  clearHoverFocus();
  document.getElementById('schoolNameFilter').value = '';
  document.getElementById('schoolFilter').value = '';
  activeGraph = graphData;
  searchMatches.clear();
  if (Graph) {
    Graph.graphData(cloneGraph(graphData));
    refreshNodeAppearance();
    focusInitialGraph(900);
  }
  updateStats(graphData);
  updateActiveFilterChips();
}

function refreshNodeAppearance() {
  if (!Graph) return;
  nodeObjectsById.clear();
  Graph
    .nodeColor(nodeColor)
    .nodeOpacity(nodeOpacity)
    .nodeThreeObject(makeNodeObject)
    .linkColor(linkColor)
    .linkOpacity(linkOpacity)
    .linkWidth(linkWidth);
}

function applySearchHighlight() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  searchMatches.clear();
  if (query) {
    activeGraph.nodes.forEach(node => {
      const haystack = `${node.id} ${node.label || ''} ${node.category || ''} ${node.description || ''}`.toLowerCase();
      if (haystack.includes(query)) searchMatches.add(node.id);
    });
  }
  refreshNodeAppearance();
  if (searchMatches.size) {
    const focusedNodes = activeGraph.nodes.filter(node => searchMatches.has(node.id));
    focusGraph({ nodes: focusedNodes, links: [] }, 900);
  }
}

function addSceneLights() {
  if (!Graph || typeof THREE === 'undefined' || !Graph.scene) return;
  const scene = Graph.scene();
  const ambient = new THREE.AmbientLight(0x9bb6ff, 0.72);
  const key = new THREE.DirectionalLight(0xffffff, 1.25);
  key.position.set(120, 180, 260);
  scene.add(ambient);
  scene.add(key);
}

function focusGraph(sourceGraph, duration = 900, options = {}) {
  if (!Graph) return;
  resetCameraControls();
  const nodes = sourceGraph && Array.isArray(sourceGraph.nodes) ? sourceGraph.nodes : [];
  if (!nodes.length) return;
  const centered = nodes.reduce((sum, node) => ({
    x: sum.x + (node.x || 0),
    y: sum.y + (node.y || 0),
    z: sum.z + (node.z || 0)
  }), { x: 0, y: 0, z: 0 });
  const center = {
    x: centered.x / nodes.length,
    y: centered.y / nodes.length,
    z: centered.z / nodes.length
  };
  const spread = nodes.reduce((maxDistance, node) => {
    const dx = (node.x || 0) - center.x;
    const dy = (node.y || 0) - center.y;
    const dz = (node.z || 0) - center.z;
    return Math.max(maxDistance, Math.sqrt(dx * dx + dy * dy + dz * dz));
  }, 0);
  const minDistance = options.minDistance || 180;
  const maxDistance = options.maxDistance || 620;
  const distanceScale = options.distanceScale || 1.55;
  const padding = options.padding || 150;
  const distance = Math.max(minDistance, Math.min(maxDistance, spread * distanceScale + padding));
  Graph.cameraPosition({ x: center.x, y: center.y, z: center.z + distance }, center, duration);
}

function resetCameraControls() {
  const controls = Graph && Graph.controls && Graph.controls();
  if (!controls) return;
  controls.enabled = true;
  controls.enableRotate = true;
  controls.enablePan = true;
  controls.enableZoom = true;
  controls.autoRotate = false;
  controls.update();
}

function focusInitialGraph(duration = 900) {
  focusGraph(graphData, duration, { maxDistance: 1680, distanceScale: 2.5, padding: 520 });
}

function focusRelatedGraph(node, duration = 1000) {
  if (!node) {
    focusGraph(activeGraph, duration, { maxDistance: 1180, distanceScale: 2.05, padding: 360 });
    return;
  }
  focusGraph(subgraphForNode(node.id), duration, { minDistance: 260, maxDistance: 760, distanceScale: 2, padding: 260 });
}

function focusNode(node) {
  if (!Graph || !node) return;
  const distance = node.category === '项目' || node.category === '学校项目' ? 120 : node.category === '空间产品' || node.category === '空间名称' ? 74 : 96;
  Graph.cameraPosition({
    x: node.x || 0,
    y: node.y || 0,
    z: (node.z || 0) + distance
  }, node, 1800);
}

function startAutoRotate() {
  if (autoRotateFrame) cancelAnimationFrame(autoRotateFrame);
  const rotate = () => {
    autoRotateFrame = requestAnimationFrame(rotate);
    if (!Graph || document.getElementById('detailOverlay').classList.contains('active')) return;
    setAutoRotateEnabled(!hoverFocus.nodeId);
  };
  rotate();
}

function setAutoRotateEnabled(enabled) {
  const controls = Graph && Graph.controls && Graph.controls();
  if (!controls) return;
  controls.autoRotate = Boolean(enabled);
  controls.autoRotateSpeed = 0.32;
  controls.update();
}

function startAmbientDrift() {
  if (ambientDriftFrame) cancelAnimationFrame(ambientDriftFrame);
  const drift = time => {
    ambientDriftFrame = requestAnimationFrame(drift);
    const paused = hoverFocus.nodeId || document.getElementById('detailOverlay').classList.contains('active');
    nodeObjectsById.forEach((object, nodeId) => {
      const node = nodesById.get(nodeId);
      if (!object || !node) return;
      if (paused) {
        object.position.set(0, 0, 0);
        return;
      }
      const phase = node.__driftPhase || 0;
      const amplitude = node.category === '项目' || node.category === '学校项目' ? 1.35 : node.category === '空间产品' || node.category === '空间名称' ? 0.72 : 1;
      object.position.set(
        Math.cos(time * 0.00045 + phase) * amplitude * 0.34,
        Math.sin(time * 0.00062 + phase) * amplitude,
        Math.sin(time * 0.00038 + phase) * amplitude * 0.26
      );
    });
  };
  ambientDriftFrame = requestAnimationFrame(drift);
}

function relatedNodes(node) {
  return graphData.links
    .filter(link => endpointId(link.source) === node.id || endpointId(link.target) === node.id)
    .map(link => {
      const sourceId = endpointId(link.source);
      const targetId = endpointId(link.target);
      const relatedId = sourceId === node.id ? targetId : sourceId;
      return {
        node: nodesById.get(relatedId),
        relation: link.relation || '关联'
      };
    })
    .filter(relation => relation.node);
}

function getDetailImages(node, relations) {
  const seen = new Set();
  const images = [];
  const addImages = sourceNode => {
    if (!Array.isArray(sourceNode.images)) return;
    sourceNode.images.forEach(image => {
      if (!image || seen.has(image)) return;
      seen.add(image);
      images.push(image);
    });
  };
  addImages(node);
  relations.forEach(relation => addImages(relation.node));
  return images.slice(0, 36);
}

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, character => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[character]));
}

function safeColor(value) {
  const color = String(value || '').trim();
  if (/^#[0-9a-f]{3}([0-9a-f]{3})?$/i.test(color)) return color;
  if (/^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(,\s*(0|1|0?\.\d+)\s*)?\)$/i.test(color)) return color;
  return '#8ea2ff';
}

function applyThemeControl(event) {
  const input = event.target;
  const color = safeColor(input.value);
  if (input.dataset.themeKey === 'project') {
    VISUAL_THEME.project.color = color;
    VISUAL_THEME.project.halo = color;
  }
  if (input.dataset.themeKey === 'space') {
    VISUAL_THEME.space.color = color;
    VISUAL_THEME.space.halo = color;
  }
  if (input.dataset.themeKey === 'category') {
    VISUAL_THEME.category.color = color;
    VISUAL_THEME.category.halo = color;
  }
  if (input.dataset.themeKey === 'highlight') {
    VISUAL_THEME.search = color;
    VISUAL_THEME.highlight = color;
  }
  refreshNodeAppearance();
}

function renderProjectMeta(node) {
  const project = node.meta && node.meta.project;
  if (!project) return '';
  const rows = [
    ['项目状态', project.status],
    ['项目周期', project.period],
    ['项目经理', Array.isArray(project.managers) ? project.managers.join(', ') : project.managers],
    ['学校类型', Array.isArray(project.schoolTypes) ? project.schoolTypes.join(', ') : (project.schoolType || project.school)],
    ['空间数量', project.spaceCount !== undefined ? `${project.spaceCount} 个空间名称` : ''],
    ['项目描述', project.description],
  ].filter(([, value]) => value);
  if (!rows.length) return '';
  return `<div class="project-meta">${rows.map(([label, value]) => `
    <div class="meta-label">${escapeHtml(label)}</div>
    <div class="meta-value">${escapeHtml(value)}</div>
  `).join('')}</div>`;
}

function renderSpaceMeta(node) {
  const attrs = (node.meta && node.meta.space) || (node.meta && node.meta.designAttributes);
  if (!attrs) return '';
  const rows = [
    ['ACTIVITIES', attrs.activities || attrs.styles],
    ['EQUIPMENT', attrs.equipment],
    ['UNIT PRICE', attrs.unitPrice || attrs.cost],
  ]
    .map(([label, value]) => [label, Array.isArray(value) ? value.join(', ') : value])
    .filter(([, value]) => value);
  if (!rows.length) return '';
  return `<div class="detail-section-title">空间属性</div>
    <div class="project-meta">${rows.map(([label, value]) => `
      <div class="meta-label">${escapeHtml(label)}</div>
      <div class="meta-value">${escapeHtml(value)}</div>
    `).join('')}</div>`;
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  selectedDetailNode = null;
  hoverSuppressUntil = Date.now() + 1200;
  hoverDisabledUntilPointerMove = true;
  clearHoverFocus();
  focusRelatedGraph(null, 1100);
}

function openLightbox(imageUrl) {
  const lightbox = document.getElementById('lightbox');
  lightbox.innerHTML = `<img src="${escapeHtml(imageUrl)}" alt="">`;
  lightbox.classList.add('active');
}

function handleNodeClick(node) {
  selectedDetailNode = node;
  clearHoverFocus();
  focusNode(node);
  const overlay = document.getElementById('detailOverlay');
  const relations = relatedNodes(node);
  const detailImages = getDetailImages(node, relations);
  const color = nodeColor(node);

  overlay.innerHTML = `
    <div class="detail-panel" role="dialog" aria-modal="true">
      <div class="detail-header">
        <div class="detail-color-dot" style="background:${color}"></div>
        <div style="flex:1">
          <h2>${escapeHtml(node.label || node.id)}</h2>
          <span class="detail-category" style="background:${color}24;color:${color}">${escapeHtml(node.category || '')}</span>
        </div>
        <button class="detail-close" type="button" data-close-detail aria-label="关闭">×</button>
      </div>
      <div class="detail-body">
        ${renderProjectMeta(node)}
        ${renderSpaceMeta(node)}
        ${detailImages.length ? `<div class="detail-gallery">${detailImages.map(image => `<img src="${escapeHtml(image)}" alt="" data-lightbox-image="${escapeHtml(image)}" onerror="this.style.display='none'">`).join('')}</div>` : ''}
        <p>${escapeHtml(node.description || '暂无描述')}</p>
        ${relations.length ? `<div class="detail-section-title">关联节点 (${relations.length})</div>
        <div class="detail-relations">${relations.map(relation => `<span class="detail-rel-chip" data-node-id="${escapeHtml(relation.node.id)}" title="${escapeHtml(relation.relation)}">${escapeHtml(relation.node.label || relation.node.id)} · ${escapeHtml(relation.relation)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  overlay.classList.add('active');
}

document.getElementById('resetView').onclick = resetGraphView;
document.getElementById('schoolNameFilter').addEventListener('change', handleFilterChange);
document.getElementById('schoolFilter').addEventListener('change', handleFilterChange);
document.querySelectorAll('#themePalette input[type="color"]').forEach(input => {
  input.addEventListener('input', applyThemeControl);
});
document.getElementById('detailOverlay').addEventListener('click', event => {
  if (event.target.id === 'detailOverlay' || event.target.hasAttribute('data-close-detail')) {
    closeDetail();
    return;
  }
  const lightboxImage = event.target.getAttribute('data-lightbox-image');
  if (lightboxImage) {
    openLightbox(lightboxImage);
    return;
  }
  const nodeId = event.target.getAttribute('data-node-id');
  if (nodeId && nodesById.has(nodeId)) handleNodeClick(nodesById.get(nodeId));
});
document.getElementById('lightbox').addEventListener('click', event => {
  event.currentTarget.classList.remove('active');
  event.currentTarget.innerHTML = '';
});
window.addEventListener('pointerup', recoverNodeDrag);
window.addEventListener('mouseup', recoverNodeDrag);
window.addEventListener('touchend', recoverNodeDrag);
window.addEventListener('blur', recoverNodeDrag);
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') {
    closeDetail();
    document.getElementById('lightbox').classList.remove('active');
  }
});

window.addEventListener('mousemove', event => {
  if (hoverDisabledUntilPointerMove) {
    hoverDisabledUntilPointerMove = false;
    hoverSuppressUntil = Date.now() + 250;
  }
  const tooltip = document.getElementById('tooltip');
  tooltip.style.left = `${event.clientX + 14}px`;
  tooltip.style.top = `${event.clientY + 12}px`;
});

window.addEventListener('resize', () => {
  if (!Graph) return;
  Graph.width(window.innerWidth);
  Graph.height(window.innerHeight);
});

waitForGraphLibrary();
</script>
