<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Display Override Admin</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #f6f7fb;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #dfe4ee;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    .preview-link {
      border: 0;
      border-radius: 6px;
      background: #2454d6;
      color: #ffffff;
      cursor: pointer;
      padding: 9px 13px;
      text-decoration: none;
      white-space: nowrap;
    }

    button.secondary,
    .preview-link {
      background: #e8ecf7;
      color: #172033;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px 24px 28px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview-note {
      max-width: 420px;
      color: #59657a;
      font-size: 12px;
      line-height: 1.35;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #dfe4ee;
      border-radius: 8px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 15px;
      border-bottom: 1px solid #e8ecf2;
    }

    .filters {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid #e8ecf2;
    }

    .field {
      display: grid;
      gap: 6px;
      margin: 0 0 14px;
    }

    label,
    .label {
      color: #59657a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #ccd5e4;
      border-radius: 6px;
      background: #ffffff;
      color: #172033;
      padding: 9px 10px;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    .node-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: calc(100vh - 220px);
      overflow: auto;
    }

    .node-list button {
      display: grid;
      width: 100%;
      gap: 4px;
      border-radius: 0;
      border-bottom: 1px solid #eef1f6;
      background: transparent;
      color: #172033;
      padding: 11px 14px;
      text-align: left;
    }

    .node-list button:hover,
    .node-list button.active {
      background: #edf3ff;
    }

    .node-name {
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .node-meta {
      color: #59657a;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
      gap: 18px;
      padding: 16px;
    }

    .summary {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid #e8ecf2;
      border-radius: 8px;
      background: #f9fbff;
    }

    .summary strong,
    .summary span {
      overflow-wrap: anywhere;
    }

    #themeEditor {
      display: grid;
      gap: 12px;
    }

    .theme-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 86px 96px 96px;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid #e8ecf2;
      border-radius: 8px;
    }

    .theme-row input[type="color"] {
      height: 38px;
      padding: 3px;
    }

    .status {
      min-height: 20px;
      color: #59657a;
      font-size: 13px;
    }

    @media (max-width: 860px) {
      header,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }

      main,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .node-list {
        max-height: 320px;
      }

      .theme-row {
        grid-template-columns: 1fr 82px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Display Override Admin</h1>
    <div class="toolbar">
      <a class="preview-link" href="../space-library-cloud-3d.html?data=generated/notion-graph-merged.json" target="_blank" rel="noopener">Preview last generated 3D</a>
      <span class="preview-note">Preview uses the last generated merged graph. After saving overrides, rerun scripts/generate-notion-graph.mjs.</span>
      <button id="saveButton" type="button">Save overrides</button>
    </div>
  </header>

  <main>
    <section class="panel" aria-label="Node browser">
      <h2>Nodes</h2>
      <div class="filters">
        <label for="nodeSearch">Search</label>
        <input id="nodeSearch" type="search" autocomplete="off" placeholder="Find a node">
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter"></select>
      </div>
      <ul id="nodeList" class="node-list"></ul>
    </section>

    <section class="panel" aria-label="Display override editor">
      <h2>Editor</h2>
      <div class="editor-grid">
        <div>
          <div class="summary" aria-live="polite">
            <span class="label">Selected node</span>
            <strong id="selectedLabel">No node selected</strong>
            <span id="selectedCategory"></span>
            <span id="selectedId"></span>
          </div>

          <label class="field" for="hoverTag">
            <span>Hover tag</span>
            <input id="hoverTag" type="text" autocomplete="off" disabled>
          </label>

          <label class="field" for="detailNote">
            <span>Detail note</span>
            <textarea id="detailNote" disabled></textarea>
          </label>

          <div class="field">
            <span class="label">Link opacity</span>
            <input id="linkOpacity" type="range" min="0" max="1" step="0.05" value="0.45">
          </div>

          <div class="field">
            <span class="label">Link width</span>
            <input id="linkWidth" type="number" min="0.1" max="8" step="0.1" value="1">
          </div>

          <label class="field" for="backgroundColor">
            <span>3D background color</span>
            <input id="backgroundColor" type="color" value="#05070d">
          </label>

          <div class="field">
            <label for="glowStrength">3D glow strength</label>
            <input id="glowStrength" type="range" min="0" max="4" step="0.1" value="1">
          </div>

          <p id="status" class="status"></p>
        </div>

        <div>
          <h3>Category Theme</h3>
          <div id="themeEditor"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const EMPTY_OVERRIDES = {
      nodes: {},
      theme: {
        categories: {},
        links: {},
        scene3d: {}
      }
    };

    let graph = { nodes: [], links: [], categories: [] };
    let overrides = cloneOverrides(EMPTY_OVERRIDES);
    let selectedNodeId = '';

    const els = {
      nodeSearch: document.getElementById('nodeSearch'),
      categoryFilter: document.getElementById('categoryFilter'),
      nodeList: document.getElementById('nodeList'),
      selectedLabel: document.getElementById('selectedLabel'),
      selectedCategory: document.getElementById('selectedCategory'),
      selectedId: document.getElementById('selectedId'),
      hoverTag: document.getElementById('hoverTag'),
      detailNote: document.getElementById('detailNote'),
      themeEditor: document.getElementById('themeEditor'),
      linkOpacity: document.getElementById('linkOpacity'),
      linkWidth: document.getElementById('linkWidth'),
      backgroundColor: document.getElementById('backgroundColor'),
      glowStrength: document.getElementById('glowStrength'),
      saveButton: document.getElementById('saveButton'),
      status: document.getElementById('status')
    };

    function cloneOverrides(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function normalizeOverrides(value) {
      const next = cloneOverrides(EMPTY_OVERRIDES);
      if (value && typeof value === 'object') {
        next.nodes = value.nodes && typeof value.nodes === 'object' ? value.nodes : {};
        next.theme.categories = value.theme?.categories && typeof value.theme.categories === 'object' ? value.theme.categories : {};
        next.theme.links = value.theme?.links && typeof value.theme.links === 'object' ? value.theme.links : {};
        next.theme.scene3d = value.theme?.scene3d && typeof value.theme.scene3d === 'object' ? value.theme.scene3d : {};
      }
      return next;
    }

    async function loadJson(path, fallback) {
      try {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Failed to load ${path}`);
        return await response.json();
      } catch (error) {
        setStatus(error.message);
        return cloneOverrides(fallback);
      }
    }

    function categories() {
      const values = new Set();
      for (const category of graph.categories || []) {
        if (category.name) values.add(category.name);
      }
      for (const node of graph.nodes || []) {
        if (node.category) values.add(node.category);
      }
      return Array.from(values).sort((a, b) => String(a).localeCompare(String(b)));
    }

    function fillCategoryFilter() {
      const options = ['<option value="">All categories</option>'];
      for (const category of categories()) {
        options.push(`<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`);
      }
      els.categoryFilter.innerHTML = options.join('');
    }

    function filteredNodes() {
      const query = els.nodeSearch.value.trim().toLowerCase();
      const category = els.categoryFilter.value;
      return (graph.nodes || []).filter((node) => {
        const label = String(node.label || node.id || '').toLowerCase();
        const nodeCategory = String(node.category || '');
        return (!query || label.includes(query) || String(node.id || '').toLowerCase().includes(query)) &&
          (!category || nodeCategory === category);
      });
    }

    function renderNodeList() {
      const nodes = filteredNodes();
      if (!nodes.length) {
        els.nodeList.innerHTML = '<li><button type="button" disabled><span class="node-name">No matches</span></button></li>';
        return;
      }
      els.nodeList.innerHTML = nodes.map((node) => `
        <li>
          <button type="button" class="${node.id === selectedNodeId ? 'active' : ''}" data-node-id="${escapeHtml(node.id)}">
            <span class="node-name">${escapeHtml(node.label || node.id)}</span>
            <span class="node-meta">${escapeHtml(node.category || 'Uncategorized')}</span>
          </button>
        </li>
      `).join('');
    }

    function selectedNode() {
      return (graph.nodes || []).find((node) => node.id === selectedNodeId) || null;
    }

    function currentNodeOverride() {
      if (!selectedNodeId) return {};
      if (!overrides.nodes[selectedNodeId]) overrides.nodes[selectedNodeId] = {};
      return overrides.nodes[selectedNodeId];
    }

    function selectNode(nodeId) {
      persistSelectedNode();
      selectedNodeId = nodeId;
      const node = selectedNode();
      els.hoverTag.disabled = !node;
      els.detailNote.disabled = !node;
      els.selectedLabel.textContent = node ? node.label || node.id : 'No node selected';
      els.selectedCategory.textContent = node ? `Category: ${node.category || 'Uncategorized'}` : '';
      els.selectedId.textContent = node ? `ID: ${node.id}` : '';
      const nodeOverride = currentNodeOverride();
      els.hoverTag.value = nodeOverride.hoverTag || '';
      els.detailNote.value = nodeOverride.detailNote || '';
      renderNodeList();
    }

    function persistSelectedNode() {
      if (!selectedNodeId) return;
      const nodeOverride = currentNodeOverride();
      nodeOverride.hoverTag = els.hoverTag.value.trim();
      nodeOverride.detailNote = els.detailNote.value.trim();
      if (!nodeOverride.hoverTag && !nodeOverride.detailNote) {
        delete overrides.nodes[selectedNodeId];
      }
    }

    function renderThemeEditor() {
      els.themeEditor.innerHTML = categories().map((category) => {
        const categoryTheme = overrides.theme.categories[category] || {};
        const graphCategory = (graph.categories || []).find((item) => item.name === category) || {};
        const color = categoryTheme.color || graphCategory.color || '#8aa0c4';
        const sizeScale = clampNumber(categoryTheme.sizeScale ?? 1, 0.2, 4, 1);
        const opacity = clampNumber(categoryTheme.opacity ?? 1, 0, 1, 1);
        return `
          <div class="theme-row" data-category="${escapeHtml(category)}">
            <strong>${escapeHtml(category)}</strong>
            <label>
              <span class="label">Color</span>
              <input data-theme-field="color" type="color" value="${escapeHtml(color)}">
            </label>
            <label>
              <span class="label">Size</span>
              <input data-theme-field="sizeScale" type="number" min="0.2" max="4" step="0.05" value="${escapeHtml(sizeScale)}">
            </label>
            <label>
              <span class="label">Opacity</span>
              <input data-theme-field="opacity" type="number" min="0" max="1" step="0.05" value="${escapeHtml(opacity)}">
            </label>
          </div>
        `;
      }).join('');
    }

    function persistThemeControl(input) {
      const row = input.closest('[data-category]');
      if (!row) return;
      const category = row.dataset.category;
      if (!overrides.theme.categories[category]) overrides.theme.categories[category] = {};
      const field = input.dataset.themeField;
      if (field === 'color') {
        overrides.theme.categories[category][field] = input.value;
      } else if (field === 'sizeScale') {
        overrides.theme.categories[category][field] = clampNumber(input.value, 0.2, 4, 1);
      } else if (field === 'opacity') {
        overrides.theme.categories[category][field] = clampNumber(input.value, 0, 1, 1);
      }
    }

    function loadGlobalControls() {
      els.linkOpacity.value = clampNumber(overrides.theme.links.opacity ?? 0.45, 0, 1, 0.45);
      els.linkWidth.value = clampNumber(overrides.theme.links.width ?? 1, 0.1, 8, 1);
      els.backgroundColor.value = overrides.theme.scene3d.backgroundColor || '#05070d';
      els.glowStrength.value = clampNumber(overrides.theme.scene3d.glowStrength ?? 1, 0, 4, 1);
    }

    function persistGlobalControls() {
      overrides.theme.links.opacity = clampNumber(els.linkOpacity.value, 0, 1, 0.45);
      overrides.theme.links.width = clampNumber(els.linkWidth.value, 0.1, 8, 1);
      overrides.theme.scene3d.backgroundColor = els.backgroundColor.value;
      overrides.theme.scene3d.glowStrength = clampNumber(els.glowStrength.value, 0, 4, 1);
    }

    function sanitizeOverridesForExport() {
      for (const category of Object.keys(overrides.theme.categories)) {
        const categoryTheme = overrides.theme.categories[category];
        if ('sizeScale' in categoryTheme) {
          categoryTheme.sizeScale = clampNumber(categoryTheme.sizeScale, 0.2, 4, 1);
        }
        if ('opacity' in categoryTheme) {
          categoryTheme.opacity = clampNumber(categoryTheme.opacity, 0, 1, 1);
        }
      }
      overrides.theme.links.opacity = clampNumber(overrides.theme.links.opacity, 0, 1, 0.45);
      overrides.theme.links.width = clampNumber(overrides.theme.links.width, 0.1, 8, 1);
      overrides.theme.scene3d.glowStrength = clampNumber(overrides.theme.scene3d.glowStrength, 0, 4, 1);
    }

    function setStatus(message) {
      els.status.textContent = message || '';
    }

    function overrideJson() {
      persistSelectedNode();
      persistGlobalControls();
      sanitizeOverridesForExport();
      return JSON.stringify(overrides, null, 2) + '\n';
    }

    async function saveOverrides() {
      const content = overrideJson();
      if ('showSaveFilePicker' in window) {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'display-overrides.json',
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
        setStatus('Saved display-overrides.json');
        return;
      }
      const blob = new Blob([content], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'display-overrides.json';
      link.click();
      URL.revokeObjectURL(url);
      setStatus('Downloaded display-overrides.json');
    }

    async function init() {
      const [graphData, overrideData] = await Promise.all([
        loadJson('../generated/notion-graph.json', { nodes: [], links: [], categories: [] }),
        loadJson('display-overrides.json', EMPTY_OVERRIDES)
      ]);
      graph = graphData || { nodes: [], links: [], categories: [] };
      overrides = normalizeOverrides(overrideData);
      fillCategoryFilter();
      renderThemeEditor();
      loadGlobalControls();
      renderNodeList();
      const firstNode = (graph.nodes || [])[0];
      if (firstNode) selectNode(firstNode.id);
    }

    els.nodeSearch.addEventListener('input', renderNodeList);
    els.categoryFilter.addEventListener('change', renderNodeList);
    els.nodeList.addEventListener('click', (event) => {
      const button = event.target.closest('[data-node-id]');
      if (button) selectNode(button.dataset.nodeId);
    });
    els.themeEditor.addEventListener('input', (event) => {
      if (event.target.matches('[data-theme-field]')) persistThemeControl(event.target);
    });
    els.saveButton.addEventListener('click', () => {
      saveOverrides().catch((error) => setStatus(error.message));
    });

    init();
  </script>
</body>
</html>
